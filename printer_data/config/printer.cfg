[include fluidd.cfg]
[include macros/*.cfg]
[include config/*.cfg]
[include KAMP_Settings.cfg]
[exclude_object]
[skew_correction]

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_150046000F50535556323420-if00
restart_method: command

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 6500
max_z_velocity: 30
max_z_accel: 350
square_corner_velocity: 10.0 #5.0

[force_move]
enable_force_move: True     # enable force move

[gcode_arcs]
resolution: 0.1      # Enable arcs support

[idle_timeout]
timeout: 2700 #2700   #1800

#####################################################################
##   Extruder
#####################################################################

#  Connected to MOTOR_6
#  Heater - HE0
#  Thermistor - T0
[extruder]
step_pin: nhk:gpio23
dir_pin: !nhk:gpio24
enable_pin: !nhk:gpio25
rotation_distance: 47.1875218359
gear_ratio: 9:1
microsteps: 16
full_steps_per_rotation: 200  #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: nhk:gpio9
sensor_type: PT1000
sensor_pin: nhk:gpio29
#control = pid
#pid_kp = 34.467
#pid_ki = 4.255
#pid_kd = 69.796
pullup_resistor: 2200
min_temp: 10
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
max_extrude_cross_section: 5
max_extrude_only_distance: 250.0
pressure_advance: 0.025
pressure_advance_smooth_time: 0.040 #  Default is 0.040, leave stock

#  E0 on MOTOR6
[tmc2209 extruder]
uart_pin: nhk:gpio0
tx_pin: nhk:gpio1
interpolate: false
run_current: 0.6
sense_resistor: 0.100
stealthchop_threshold: 0
 
#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to MOTOR_0
##  Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 39.93 #40
microsteps: 32
full_steps_per_rotation: 200 #set to 200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_min: 0
position_max: 351
position_endstop: 351
homing_speed: 80 # Max 100
homing_retract_dist: 5
homing_retract_speed: 20
min_home_dist: 5
second_homing_speed: 20
# use_sensorless_homing: False
# homing_positive_dir: true

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 0.9
home_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0 #0 is off
diag_pin: ^PG6 # use the same pin that was previously the endstop_pin!
driver_SGTHRS: 120 # 255 is most sensitive value, 0 is least sensitive

##  A Stepper - Right
##  Connected to MOTOR_1
##  Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 39.94 #40
microsteps: 32
full_steps_per_rotation: 200 #set to 200 for 1.8 degree, 400 for 0.9 degree
endstop_pin: tmc2209_stepper_y:virtual_endstop #PG9
position_min: -4
position_max: 355
position_endstop: 355
homing_speed: 80 #20   #Max 100
homing_retract_dist: 5
homing_retract_speed: 20
min_home_dist: 5
second_homing_speed: 20
# use_sensorless_homing: False
# homing_positive_dir: true

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 0.9
home_current: 0.7
sense_resistor: 0.110
stealthchop_threshold: 0 #0 is off
diag_pin: ^PG9 # use the same pin that was previously the endstop_pin!
driver_SGTHRS: 145 # 255 is most sensitive value, 0 is least sensitive

#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to MOTOR_2
##  Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

position_max: 285 #310
position_min: -10
homing_speed: 10
second_homing_speed: 3

endstop_pin: probe:z_virtual_endstop # use beacon as virtual endstop
homing_retract_dist: 0 # beacon needs this to be set to 0

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 Stepper - Rear Left
##  Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Rear Right
##  Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z3 Stepper - Front Right
##  Connected to MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Bed Heater
#####################################################################

##  SSR Pin - HE1
##  Thermistor - TB
[heater_bed]
heater_pin: PA1
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF3
max_power: 1 #0.85
min_temp: 0
max_temp: 120

#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
# https://www.klipper3d.org/Bed_Mesh.html
speed: 250                  # speed (in mm/s) of non-probing moves, default is 50
zero_reference_position: 175, 175  #   Setting this parameter will normalize mesh adjustments to the offset found
                                   #   at the specified position. This should nearly always be the same as your
                                   #   safe_z_home position and the position where beacon_calibrate was performed.
horizontal_move_z: 5        # the Z coordinate the probe rises to prior to traveling between points, default is 5
mesh_min: 30, 25            # The first probed coordinate, nearest to the origin relative to probe
mesh_max: 320, 320          # The probed coordinate farthest farthest from the origin
probe_count: 10, 10         # The number of points to probe on each axis, specified as X, Y integer values.
fade_start: 1               # Z height in which to start phasing out adjustment
fade_end: 10                # Z height in which fade should complete.
fade_target: 0              # thought of as an additional Z offset applied to the entire bed after fade completes
mesh_pps: 2, 2              # specifies how many points to interpolate for each segment along the X and Y axes
algorithm: bicubic
bicubic_tension: 0.2

#####################################################################
#   Retraction
#####################################################################

[firmware_retraction]
retract_length: 0           # The length of filament (in mm) to retract when G10 is activated, and to unretract
                            # when G11 is activated (but see unretract_extra_length below). The default is 0 mm.
retract_speed: 20           # The speed of retraction, in mm/s. The default is 20 mm/s.
unretract_extra_length: 0   # The length (in mm) of *additional* filament to add when unretracting.
unretract_speed: 10         # The speed of unretraction, in mm/s. The default is 10 mm/s.

#####################################################################
#   Temps
#####################################################################

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor octopus]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor chamber_temp]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF4
min_temp: 0
max_temp: 100
gcode_id: chamber_th

#####################################################################
#   Fan Control
#####################################################################

##  Controller fan - FAN2
[temperature_fan ebay_fan] #[temperature_fan controller_fan]
pin: PD12
kick_start_time: 1.0
max_power: 1.0
hardware_pwm: true
control: watermark
max_delta: 2
sensor_type: temperature_host  # raspberry pi
min_temp: 0.0
max_temp: 80.0
target_temp: 50

#####################################################################
#   LED Control
#####################################################################

[output_pin caselight]
pin: PD15
value: 1

#####################################################################
##  Quad Gantry
#####################################################################

##  Use QUAD_GANTRY_LEVEL to level a gantry.
##  Min & Max gantry corners - measure from nozzle at MIN (0,0) and 

##  Gantry Corners for 350mm Build
[quad_gantry_level]
gantry_corners: 
   -60,-10
   410,420
##  Probe points
points:
   15, 15 # 15, 15
   15, 313 # 15, 335
   335, 313 # 335, 335
   335, 15 # 335, 15

speed: 350 # 150
horizontal_move_z:5
retries: 10
retry_tolerance: 0.0075
max_adjust: 10

#####################################################################
##  Input Shaper
#####################################################################
[input_shaper]
shaper_freq_x: 68.4
shaper_type_x: mzv
shaper_freq_y: 46.8
shaper_type_y: mzv

#####################################################################
#   Respond
#####################################################################
[respond]
default_type: command
default_prefix: echo:

