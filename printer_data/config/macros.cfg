#[include KAMP_Settings.cfg]
[include TEST_SPEED.cfg]

#####################################################################
##   Home and QGL
#####################################################################

[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90
    G28
    QUAD_GANTRY_LEVEL PROBE_METHOD=CONTACT
    G28 Z METHOD=CONTACT
    # G0 X175 Y175 Z30 F3600
    RESTORE_GCODE_STATE NAME=STATE_G32

#####################################################################
##   Print Start
#####################################################################

[gcode_macro PRINT_START]
gcode:
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.EXTRUDER|int %}
    SKEW_PROFILE LOAD=CaliFlower
    SET_PIN PIN=caselight VALUE=1.0  ; turn on case light
    SET_LED LED="headlight" RED=1.0 GREEN=0 BLUE=0 WHITE=0 SYNC=0  ; SB LED: red

    M221 S100   ; reset flow to 100%
    M220 S100   ; reset speed to 100%

    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0

    G28     ; home axes
    G0 Z2   ; position beacon at 2mm for heat soak

    RESPOND TYPE=error MSG="Heating bed to {bedtemp}"
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bedtemp}  ; set bed temp
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bedtemp} MAXIMUM={bedtemp+1}  ; wait for bed to get to printing temp
    
    {% if bedtemp >= 100 %}
    SET_FAN_SPEED FAN=BedFans SPEED=0.6
	SET_FAN_SPEED FAN=nevermore SPEED=0.6
    RESPOND TYPE=error MSG="Waiting for chamber to reach 45c"
    TEMPERATURE_WAIT SENSOR="temperature_sensor chamber_temp" MINIMUM=45 MAXIMUM=100  ; wait for chamber to reach 45 if ABS
    {% endif %}

    RESPOND TYPE=error MSG="Heating hotend to 150"
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=140 MAXIMUM=150  ; heat hotend to 150
    SET_LED LED="headlight" RED=0 GREEN=1 BLUE=0 WHITE=0 SYNC=0  ; SB LED: green
    
    RESPOND TYPE=error MSG="Homing"
    # M204 S7500
    G28 Z METHOD=CONTACT CALIBRATE=1    ; calibrate z offset and beacon model hot
    # CLEAN_NOZZLE  ; clean nozzle macro
    RESPOND TYPE=error MSG="QGL"
    QUAD_GANTRY_LEVEL PROBE_METHOD=CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=1    ; calibrate z offset and beacon model hot
    RESPOND TYPE=error MSG="Creating mesh"
    BED_MESH_CALIBRATE RUNS=2         ; bed mesh in scan mode

    # G1 X180 Y344 Z0.4 F5000.0        ; Move to poop start position
    G1  Z10 F3000                  ;move up by 10 to avoid objects
    G1  X5 Y15 F15000              ;move to purge position
    G1  Z0.3 F3000                 ;move to purge position
    
    # G1 X190 Y354 F6000  ; move to pooping position
    # G1 Z3 F1500  ; move to start Z height to poop

    RESPOND TYPE=error MSG="Heating hotend to {hotendtemp}"
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={hotendtemp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotendtemp} MAXIMUM={hotendtemp+1} ; M109 S{hotendtemp}    ; heat nozzle to slicer temp

    SET_GCODE_OFFSET Z=0.06     ; add a little offset for hotend thermal expansion
                                ; needs fine tuning, long meltzones require more
                                
    POOP  ; Poop macro
    
    SET_LED LED="headlight" RED=0 GREEN=0 BLUE=0 WHITE=1.0 SYNC=0  ; SB LED: white
    RESPOND TYPE=error MSG="LET'S GOOO !!"
    LINE_PURGE
      
#####################################################################
##   Print End
#####################################################################

[gcode_macro PRINT_END]
gcode:
    {% set bedtemp = params.BED|int %}
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    SET_SKEW CLEAR=1
    
    M400  ; wait for buffer to clear
    G92 E0  ; zero the extruder
    G1 E-10.0 F1800  ; retract filament
    
    TURN_OFF_HEATERS
    
    G90  ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    M107  ; turn off fan
    SET_LED LED="headlight" RED=0 GREEN=0 BLUE=0 WHITE=0 SYNC=0 TRANSMIT=1  ; turn off SB LED    
    BED_MESH_CLEAR
    M84  ; disable motors 
    
    RESPOND TYPE=error MSG="filtering air for 5 minutes"
    SET_FAN_SPEED  FAN=nevermore SPEED=0.75  ; set nevermore to high
    SET_FAN_SPEED FAN=BedFans SPEED=0.75  ; set bed fans to high
    G4 P300000
    
    SET_FAN_SPEED FAN=nevermore SPEED=0  ; turn off nevermore fan
    SET_FAN_SPEED FAN=BedFans SPEED=0  ; turn off bed fans
    # SET_PIN PIN=caselight VALUE=0.0  ; turn off case light
    M221 S100   ; reset flow to 100%
    M220 S100   ; reset speed to 100%
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END

#####################################################################
##   Clean Nozzle
#####################################################################

[gcode_macro CLEAN_NOZZLE]
variable_start_x: 193
variable_start_y: 354
variable_start_z: 1.0
variable_wipe_dist: 50
variable_wipe_qty: 8
variable_wipe_spd: 350
variable_raise_distance: 15

gcode:
 {% if "xyz" not in printer.toolhead.homed_axes %}
   G28
 {% endif %}
 
 G90                                           ; absolute positioning
 ## Move nozzle to start position
 G1 X{start_x} Y{start_y} F15000  ; 250mm/s   #F6000  ;  100mm/s
 G1 Z{start_z} F1500

 ## Wipe nozzle
 {% for wipes in range(1, (wipe_qty + 1)) %}
   G1 X{start_x + wipe_dist} F{wipe_spd * 60}
   G1 X{start_x} F{wipe_spd * 60}
 {% endfor %}

## Raise nozzle
 G1 Z{raise_distance}

#####################################################################
#   Poop
#####################################################################

[gcode_macro POOP]
gcode:
    # https://www.printables.com/model/499504-prime-pellet-purge-bin-voron-24
    M106 S255                      ;partcooling fan max
    CLEAN                          ;call clean macro
    G1  Z10 F3000                  ;move up by 10 to avoid objects
    G1  X5 Y15 F15000              ;move to purge position
    G1  Z0.3 F3000                 ;move to purge position
    G91                            ;incremental positioning
    G1  Z0.2 E30 F3                ;prime hotend
    G1  Z2.0 E25 F30               ;purge and move up
    G1  Z4.0 E20 F60               ;purge and move up
    G1  Z2.0 E10 F240              ;purge and move up
    G1  Z10  E-0.1 F3600           ;move up by 10 and retract slightly

    G1  X55 Z-18.25 F3000          ;move to wiping start
    G1  X10 F3000                  ;wipe back
    G1  X-10 F3000                 ;wipe forth
    G1  X10 F3000                  ;wipe back
    G1  X-10 F3000                 ;wipe forth
    G1  X-55 F3000                 ;wipe end and kick off the poop pellet
    
    M107                           ;turn cooling fan off
    G1  Z2.0  F3000                ;move up
    G1  X55   F7000                ;move from pellet bin quickly!
    M82                            ;extruder absolute
    G92 E0.0                       ;extruder reset
    G90                            ;absolute positioning
    M107                           ;partcooling fan off

    #------------------------------------------------------------------------

[gcode_macro CLEAN]
gcode:
    M204 S6000                     ;set acceleration to 6000
    G1 X35 Y15 F15000              ;move to position
    G1 Z0.5 F3000                  ;move to position
    G1 Y1 F10000                   ;kick the prime tower off

#####################################################################
##   Cancel Print
#####################################################################

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_CANCEL_PRINT
    SET_SKEW CLEAR=1
    
    M400  ; wait for buffer to clear
    G92 E0  ; zero the extruder
    G1 E-10.0 F1800  ; retract filament
    
    TURN_OFF_HEATERS
    
    G90  ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F20000 ; F3600  ; park nozzle at rear
    M107  ; turn off fan
    BED_MESH_CLEAR
    M84  ; disable motors
    M221 S100   ; reset flow to 100%
    M220 S100   ; reset speed to 100%
    CANCEL_PRINT_BASE

#####################################################################
##   Load Filament
#####################################################################

[gcode_macro LOAD_FILAMENT]
gcode:
    M83  ; set extruder to relative
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250  ; set heater to 250
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=245 MAXIMUM=255  ; wait for heater to reach 245
    # M109 S250  ; heat hotend to 220 and wait
    G1 E50 F300  ; load
    G1 E15 F150  ; prime nozzle with filament
    # M104 S0  ; turn off nozzle heater
    M82  ; set extruder to absolute
    
#####################################################################
##   Unload Filament
#####################################################################

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83  ; set extruder to relative
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=250  ; set heater to 250
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=245 MAXIMUM=255  ; wait for heater to reach 245    
    # M109 S250  ; heat hotend to 250 and wait
    G1 E10 F300  ; extrude a little to soften tip
    G1 E-40 F1800  ; retract some, but not too much or it will jam
    # M104 S0  ; turn off nozzle heater
    M82  ; set extruder to absolute

#####################################################################
##   Set Axises
#####################################################################
[gcode_macro SET_AXIS]
gcode:
   SET_KINEMATIC_POSITION X=175 Y=175 Z=0

#####################################################################
##   Set Print last print
#####################################################################
[gcode_macro REPRINT_LAST]
gcode:
    {% set state = printer.print_stats.state %}
    {% set file = printer.print_stats.filename %}
    {% if state == 'printing' %}
        { action_respond_info("Print is still running") }
    {% elif not file.endswith("gcode") %}
        { action_respond_info("No file to reprint") }
    {% else %}
        SDCARD_PRINT_FILE FILENAME="{file}"
        { action_respond_info("Print job restarted.") }
    {% endif %}

#####################################################################
##   Force load filament
#####################################################################
[gcode_macro FILAMENT_LOAD]
gcode:
    G92  # M83
    FORCE_MOVE STEPPER=extruder DISTANCE=60 VELOCITY=25
    # G92

#####################################################################
##   Force unload filament
#####################################################################
[gcode_macro FILAMENT_UNLOAD]
gcode:
    G92  # M83
    FORCE_MOVE STEPPER=extruder DISTANCE=-80 VELOCITY=25
    # G92

[gcode_macro _HOME_PRE_AXIS]
gcode:
  # Adapt this for your printer.
  {% set HOME_CURRENT = 0.5 %}
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT={HOME_CURRENT}
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT={HOME_CURRENT}

#####################################################################
##   Beacon stuff
#####################################################################
[gcode_macro _HOME_POST_AXIS]
gcode:
  {% set axis = params.AXIS %}
  {% set RUN_CURRENT_X = printer.configfile.settings['tmc2209 stepper_x'].run_current|float %}
  {% set RUN_CURRENT_Y = printer.configfile.settings['tmc2209 stepper_y'].run_current|float %}

  # Move away
  SAVE_GCODE_STATE NAME=home_post_axis
  G91
  G0 {axis}-10 F3600
  RESTORE_GCODE_STATE NAME=home_post_axis

  # Make sure StallGuard registers are cleared
  M400
  # Set current during print
  SET_TMC_CURRENT STEPPER=stepper_x CURRENT={RUN_CURRENT_X}
  SET_TMC_CURRENT STEPPER=stepper_y CURRENT={RUN_CURRENT_Y}

#####################################################################
##   Backup klipper
#####################################################################
[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh $0"
timeout: 90.0
verbose: True